<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shafston 2026 Financial Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B1120;color:#E2E8F0;font-family:'Inter',system-ui,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#1E293B}
::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js" crossorigin></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
</head>
<body>
<div id="root"></div>
<script>
window.onerror=function(msg,src,line){document.getElementById('root').innerHTML='<p style="color:#EF4444;padding:40px;font-size:18px;">Dashboard Error: '+msg+' (line '+line+')</p>';};

var h = React.createElement;
var useState = React.useState;
var useMemo = React.useMemo;
var RC = Recharts;
var BarChart=RC.BarChart, Bar=RC.Bar, LineChart=RC.LineChart, Line=RC.Line,
    AreaChart=RC.AreaChart, Area=RC.Area, PieChart=RC.PieChart, Pie=RC.Pie, Cell=RC.Cell,
    ComposedChart=RC.ComposedChart, XAxis=RC.XAxis, YAxis=RC.YAxis,
    CartesianGrid=RC.CartesianGrid, Tooltip=RC.Tooltip, Legend=RC.Legend,
    ResponsiveContainer=RC.ResponsiveContainer, ReferenceLine=RC.ReferenceLine,
    LabelList=RC.LabelList;

/* ========== DATA CONSTANTS ========== */
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MONTHLY_TARGETS = {Jan:350000,Feb:400000,Mar:350000,Apr:350000,May:300000,Jun:350000,Jul:700000,Aug:800000,Sep:600000,Oct:500000,Nov:500000,Dec:500000};
var ANNUAL_TARGET = 5700000;
var BREAKEVEN_EXCL = 3600000;
var BREAKEVEN_INCL = 5100000;

var PRODUCT_LINES = [
  {key:'ST',name:'Study Tour',targetRev:1800000,targetGP:51.0,deRate:0.49,color:'#0A6EBD'},
  {key:'SA',name:'Student Arrival',targetRev:1200000,targetGP:37.0,deRate:0.63,color:'#12A89D'},
  {key:'U18',name:'U18',targetRev:500000,targetGP:48.0,deRate:0.52,color:'#F29727'},
  {key:'YLC',name:'YLC',targetRev:300000,targetGP:48.0,deRate:0.52,color:'#E74C3C'},
  {key:'Other',name:'Other',targetRev:1900000,targetGP:71.0,deRate:0.29,color:'#8B5CF6'}
];

var COST_BUDGET = {hr:97347,rent:31683,opex:12833,sales:25839};
var MONTHLY_OPEX_BUDGET = 97347+31683+12833+25839;

var DEBT_OPENING = {ato:732359,refund:72553,commission:334467,stExpenses:0,opex:496337,payrollTax:82108,total:1775246};
var MONTHLY_DEBT_TARGET = 64265;
var ANNUAL_DEBT_TARGET = 771177;

var SCENARIOS = [
  {name:'Floor',revenue:3232000,gp:1628000,gpPct:50.4,ebida:-2000,netEbida:-773000},
  {name:'Downside',revenue:4162000,gp:2101000,gpPct:50.5,ebida:291000,netEbida:-480000},
  {name:'Target',revenue:5700000,gp:2959000,gpPct:51.9,ebida:947000,netEbida:175000}
];

/* FY2025 monthly data for same-period comparison */
var FY2025 = {
  revenue:{total:9713940,netRevenue:8706798,commission:1007142},
  directExpenses:{teachingCost:1585044,stYlcCost:894001,saCost:1062233,total:3541278},
  grossProfit:5165519,gpPct:59.3,
  operationalExpenses:{hr:2430256,rentOutgoing:632027,salesCost:290262,operatingCost:972222,totalOpEx:4324767},
  netProfit:840753,
  monthly:{
    Jan:{revenue:650000,de:230000,gp:420000,gpPct:64.6,opex:360000,ebida:60000,cash:180000},
    Feb:{revenue:720000,de:260000,gp:460000,gpPct:63.9,opex:355000,ebida:105000,cash:210000}
  }
};

/* Actual monthly data from Xero - Feb 2026 report */
var MONTHLY_DATA = [
  {month:'Jan',target:350000,
    revenue:{st:269290,sa:24124,u18:4990,ylc:-2916,other:77619,total:373107},
    de:{st:16612,sa:26582,u18:15430,ylc:4180,other:14831,total:77635},
    gp:295472,gpPct:79.2,
    opex:{hr:109344,rent:46208,sales:14479,operating:92053,total:262084},
    ebida:33389,cash:216746,super_:76827,ato:725312,
    debtTotal:1862280},
  {month:'Feb',target:400000,
    revenue:{st:412785,sa:38972,u18:46315,ylc:2044,other:115869,total:615984},
    de:{st:91055,sa:83433,u18:27925,ylc:3237,other:5590,total:211240},
    gp:404744,gpPct:65.7,
    opex:{hr:140781,rent:70970,sales:1204,operating:42944,total:255899},
    ebida:148846,cash:138215,super_:37839,ato:740216,
    debtTotal:2085627}
];

var DEBT_CURRENT = {ato:740216,refund:80853,commission:429041,stExpenses:96,opex:835421,payrollTax:0};
var DEBT_TOTAL = 740216+80853+429041+96+835421+0;

var PREDICTIONS = {
  Mar:{col_e:97734,col_d:null,source:'1-Month Accrued'},
  Apr:{col_e:null,col_d:197777,source:'AI 2-Month'},
  May:{col_e:null,col_d:null,source:'Target'}
};

/* ========== UTILITIES ========== */
function fmt(n){if(n==null)return'-';var abs=Math.abs(n);var s=abs>=1000000?'$'+(abs/1000000).toFixed(1)+'M':abs>=1000?'$'+Math.round(abs/1000).toLocaleString()+'K':'$'+Math.round(abs).toLocaleString();return n<0?'-'+s:s;}
function fmtFull(n){if(n==null)return'-';return(n<0?'-$':'$')+Math.abs(Math.round(n)).toLocaleString();}
function fmtPct(n){return n==null?'-':(n>=0?'+':'')+n.toFixed(1)+'%';}
function pct(n){return n==null?'-':n.toFixed(1)+'%';}

/* ========== COMPUTED METRICS ========== */
var monthsElapsed = MONTHLY_DATA.length;
var ytdRevenue = MONTHLY_DATA.reduce(function(s,m){return s+m.revenue.total;},0);
var ytdTarget = MONTHLY_DATA.reduce(function(s,m){return s+m.target;},0);
var ytdCompletion = ytdRevenue/ytdTarget*100;
var annualCompletion = ytdRevenue/ANNUAL_TARGET*100;
var projectedAnnual = (ytdRevenue/monthsElapsed)*12;
var latestCash = MONTHLY_DATA[MONTHLY_DATA.length-1].cash;
var ytdGP = MONTHLY_DATA.reduce(function(s,m){return s+m.gp;},0);
var ytdGPPct = ytdGP/ytdRevenue*100;
var ytdDE = MONTHLY_DATA.reduce(function(s,m){return s+m.de.total;},0);
var ytdHR = MONTHLY_DATA.reduce(function(s,m){return s+m.opex.hr;},0);
var ytdRent = MONTHLY_DATA.reduce(function(s,m){return s+m.opex.rent;},0);
var ytdSales = MONTHLY_DATA.reduce(function(s,m){return s+m.opex.sales;},0);
var ytdOperating = MONTHLY_DATA.reduce(function(s,m){return s+m.opex.operating;},0);
var ytdOpEx = ytdHR+ytdRent+ytdSales+ytdOperating;
var ytdEBIDA = MONTHLY_DATA.reduce(function(s,m){return s+m.ebida;},0);
var debtPaid = DEBT_OPENING.total-DEBT_TOTAL;
var scenarioLabel = projectedAnnual>=5700000?'ON TARGET':projectedAnnual>=4162000?'DOWNSIDE':projectedAnnual>=3232000?'FLOOR':'BELOW FLOOR';
var scenarioColor = projectedAnnual>=5700000?'#10B981':projectedAnnual>=4162000?'#F59E0B':'#EF4444';
var avgMonthly = ytdRevenue/monthsElapsed;

/* Full 12-month revenue chart data */
var fullYearChartData = MONTHS.map(function(m){
  var md = MONTHLY_DATA.find(function(d){return d.month===m;});
  return {month:m, target:MONTHLY_TARGETS[m], actual:md?md.revenue.total:null};
});

/* Cumulative */
var cumulativeData = [];
var cumActual=0, cumTarget=0;
MONTHS.forEach(function(m){
  cumTarget += MONTHLY_TARGETS[m];
  var md = MONTHLY_DATA.find(function(d){return d.month===m;});
  if(md){cumActual += md.revenue.total;cumulativeData.push({month:m,actual:cumActual,target:cumTarget});}
  else{cumulativeData.push({month:m,actual:null,target:cumTarget});}
});

/* Product YTD */
var productYTD = PRODUCT_LINES.map(function(pl){
  var k = pl.key.toLowerCase();
  var rev=0,de=0;
  MONTHLY_DATA.forEach(function(m){rev+=(m.revenue[k]||0);de+=(m.de[k]||0);});
  var gp=rev-de;
  return{key:pl.key,name:pl.name,color:pl.color,rev:rev,de:de,gp:gp,gpPct:rev>0?gp/rev*100:0,targetRev:pl.targetRev,targetGP:pl.targetGP,progress:rev/pl.targetRev*100};
});

/* OpEx chart */
var opexChartData = MONTHLY_DATA.map(function(m){return{month:m.month,hr:m.opex.hr,rent:m.opex.rent,sales:m.opex.sales,operating:m.opex.operating,total:m.opex.total,budget:MONTHLY_OPEX_BUDGET};});

/* Debt 12-month tracking */
var debtTrackingData = MONTHS.map(function(m,i){
  var md = MONTHLY_DATA.find(function(d){return d.month===m;});
  var budgetDebt = DEBT_OPENING.total - MONTHLY_DEBT_TARGET*(i+1);
  return {month:m, budget:Math.max(budgetDebt,0), actual:md&&md.debtTotal?md.debtTotal:null};
});

/* Cash forecast */
var cashForecast = [];
var prevCash = latestCash;
['Mar','Apr','May'].forEach(function(m){
  var pred = PREDICTIONS[m]||{};
  var bestRev = pred.col_e||pred.col_d||MONTHLY_TARGETS[m];
  var predDE = Math.round(bestRev*0.45);
  var predHR = COST_BUDGET.hr;
  var predOther = COST_BUDGET.rent+COST_BUDGET.sales+COST_BUDGET.opex;
  var debt = MONTHLY_DEBT_TARGET;
  var closing = Math.round(prevCash+bestRev-predDE-predHR-predOther-debt);
  cashForecast.push({month:m,opening:prevCash,revenue:bestRev,de:predDE,hr:predHR,other:predOther,debt:debt,closing:closing,source:pred.source||'Target'});
  prevCash=closing;
});

var cashTrendData = MONTHLY_DATA.map(function(m){return{month:m.month,actual:m.cash,projected:null};}).concat(
  cashForecast.map(function(f){return{month:f.month,actual:null,projected:f.closing};})
);

/* Debt pie */
var debtPieData = [
  {name:'ATO',value:DEBT_CURRENT.ato,color:'#EF4444'},
  {name:'Commission',value:DEBT_CURRENT.commission,color:'#3B82F6'},
  {name:'OPEX',value:DEBT_CURRENT.opex,color:'#8B5CF6'},
  {name:'Refund',value:DEBT_CURRENT.refund,color:'#F59E0B'},
  {name:'ST Expenses',value:DEBT_CURRENT.stExpenses,color:'#10B981'}
].filter(function(d){return d.value>0;});

/* ========== STYLES ========== */
var S = {
  header:{background:'linear-gradient(135deg,#0F172A 0%,#1E293B 100%)',padding:'16px 32px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid #334155',position:'sticky',top:0,zIndex:100},
  headerTitle:{fontSize:20,fontWeight:700,color:'#F8FAFC',letterSpacing:'-0.02em'},
  badge:{padding:'4px 12px',borderRadius:20,fontSize:11,fontWeight:700,letterSpacing:'0.05em'},
  nav:{display:'flex',gap:4,padding:'12px 32px',background:'#0F172A',borderBottom:'1px solid #1E293B',flexWrap:'wrap'},
  navBtn:{padding:'8px 16px',borderRadius:8,border:'1px solid transparent',cursor:'pointer',fontSize:13,fontWeight:500,background:'transparent',color:'#94A3B8',transition:'all 0.2s'},
  navBtnActive:{padding:'8px 16px',borderRadius:8,border:'1px solid #3B82F6',cursor:'pointer',fontSize:13,fontWeight:600,background:'rgba(59,130,246,0.15)',color:'#60A5FA'},
  content:{padding:'24px 32px',maxWidth:1400,margin:'0 auto'},
  kpiRow:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:16,marginBottom:24},
  kpi:{background:'linear-gradient(135deg,#1E293B,#0F172A)',borderRadius:12,padding:'20px',border:'1px solid #334155',position:'relative',overflow:'hidden'},
  kpiLabel:{fontSize:12,color:'#94A3B8',fontWeight:500,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:8},
  kpiValue:{fontSize:28,fontWeight:800,color:'#F8FAFC',fontFeatureSettings:'"tnum"',letterSpacing:'-0.02em'},
  kpiSub:{fontSize:12,color:'#64748B',marginTop:6},
  kpiTrend:{fontSize:12,fontWeight:600,marginTop:6},
  section:{background:'#1E293B',borderRadius:12,padding:24,border:'1px solid #334155',marginBottom:24},
  sectionTitle:{fontSize:16,fontWeight:700,color:'#F8FAFC',marginBottom:16},
  chartWrap:{width:'100%',height:320},
  grid2:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24,marginBottom:24},
  grid3:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:24,marginBottom:24},
  table:{width:'100%',borderCollapse:'collapse',fontSize:13},
  th:{padding:'10px 12px',textAlign:'left',borderBottom:'2px solid #334155',color:'#94A3B8',fontWeight:600,fontSize:11,textTransform:'uppercase',letterSpacing:'0.05em'},
  td:{padding:'10px 12px',borderBottom:'1px solid #1E293B',color:'#E2E8F0',fontFeatureSettings:'"tnum"'},
  tdRight:{padding:'10px 12px',borderBottom:'1px solid #1E293B',color:'#E2E8F0',fontFeatureSettings:'"tnum"',textAlign:'right'},
  productCard:{background:'linear-gradient(135deg,#0F172A,#1E293B)',borderRadius:10,padding:16,border:'1px solid #334155'},
  progressBar:{height:6,background:'#1E293B',borderRadius:3,overflow:'hidden',marginTop:8},
  progressFill:{height:'100%',borderRadius:3,transition:'width 0.5s ease'},
  footer:{textAlign:'center',padding:'16px',color:'#475569',fontSize:11},
  miniCard:{background:'#0F172A',borderRadius:8,padding:'12px 16px',border:'1px solid #334155'},
  tag:{display:'inline-block',padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:700,letterSpacing:'0.05em'}
};

/* ========== SHARED COMPONENTS ========== */
function KpiCard(props){
  var glowColor = props.alert==='red'?'rgba(239,68,68,0.15)':props.alert==='amber'?'rgba(245,158,11,0.15)':'transparent';
  var borderColor = props.alert==='red'?'#EF4444':props.alert==='amber'?'#F59E0B':'#334155';
  var trendColor = props.trendUp===true?'#10B981':props.trendUp===false?'#EF4444':'#94A3B8';
  return h('div',{style:Object.assign({},S.kpi,{boxShadow:'0 0 20px '+glowColor,borderColor:borderColor})},
    h('div',{style:S.kpiLabel},props.label),
    h('div',{style:Object.assign({},S.kpiValue,props.valueColor?{color:props.valueColor}:{})},props.value),
    props.sub?h('div',{style:S.kpiSub},props.sub):null,
    props.trend?h('div',{style:Object.assign({},S.kpiTrend,{color:trendColor})},props.trend):null
  );
}
function DataTable(props){
  return h('div',{style:{overflowX:'auto'}},
    h('table',{style:S.table},
      h('thead',null,h('tr',null,props.headers.map(function(hd,i){
        return h('th',{key:i,style:Object.assign({},S.th,i>0?{textAlign:'right'}:{})},hd);
      }))),
      h('tbody',null,props.rows.map(function(row,ri){
        var isTotal = ri===props.rows.length-1&&props.totalRow;
        return h('tr',{key:ri,style:isTotal?{fontWeight:700,borderTop:'2px solid #334155'}:{}},
          row.map(function(cell,ci){return h('td',{key:ci,style:ci>0?S.tdRight:S.td},cell);})
        );
      }))
    )
  );
}

/* ========== TAB 1: OVERVIEW ========== */
function OverviewTab(){
  return h('div',null,
    h('div',{style:S.kpiRow},
      h(KpiCard,{label:'YTD Revenue',value:fmt(ytdRevenue),trend:pct(ytdCompletion)+' of target',trendUp:ytdCompletion>=100,sub:fmtFull(ytdTarget)+' target'}),
      h(KpiCard,{label:'Annual Completion',value:pct(annualCompletion),sub:monthsElapsed+'/12 months elapsed',trend:fmt(ANNUAL_TARGET)+' target'}),
      h(KpiCard,{label:'Projected Annual',value:fmt(projectedAnnual),sub:scenarioLabel,trend:'Run-rate: '+fmt(avgMonthly)+'/mo',trendUp:projectedAnnual>=ANNUAL_TARGET,alert:projectedAnnual<3232000?'red':projectedAnnual<5700000?'amber':null}),
      h(KpiCard,{label:'Cash Position',value:fmtFull(latestCash),sub:'End of '+MONTHLY_DATA[MONTHLY_DATA.length-1].month+' 2026',alert:latestCash<50000?'red':latestCash<150000?'amber':null}),
      h(KpiCard,{label:'Total Debt',value:fmt(DEBT_TOTAL),sub:'Opening: '+fmt(DEBT_OPENING.total),trend:debtPaid>0?fmt(debtPaid)+' paid':fmt(Math.abs(debtPaid))+' increased',trendUp:debtPaid>0}),
      h(KpiCard,{label:'Gross Profit %',value:pct(ytdGPPct),sub:'Target: 51.9%',trend:ytdGPPct>=51.9?'Above target':'Below target - watch DE',trendUp:ytdGPPct>=51.9,alert:ytdGPPct<50?'red':null})
    ),
    h('div',{style:S.grid2},
      h('div',{style:S.section},
        h('div',{style:S.sectionTitle},'Monthly Revenue vs Target (Full Year)'),
        h('div',{style:S.chartWrap},
          h(ResponsiveContainer,{width:'100%',height:'100%'},
            h(ComposedChart,{data:fullYearChartData,margin:{top:20,right:20,bottom:5,left:10}},
              h(CartesianGrid,{strokeDasharray:'3 3',stroke:'#334155'}),
              h(XAxis,{dataKey:'month',stroke:'#64748B',fontSize:12}),
              h(YAxis,{stroke:'#64748B',fontSize:11,tickFormatter:function(v){return '$'+Math.round(v/1000)+'K';}}),
              h(Tooltip,{formatter:function(v){return v!=null?fmtFull(v):'-';},contentStyle:{background:'#1E293B',border:'1px solid #475569',borderRadius:8,color:'#E2E8F0'}}),
              h(Legend,null),
              h(Bar,{dataKey:'target',fill:'#334155',radius:[4,4,0,0],name:'Target'}),
              h(Bar,{dataKey:'actual',fill:'#3B82F6',radius:[4,4,0,0],name:'Actual'}),
              h(ReferenceLine,{y:avgMonthly,stroke:'#F59E0B',strokeDasharray:'5 5',label:{value:'Avg '+fmt(avgMonthly),fill:'#F59E0B',fontSize:11,position:'right'}})
            )
          )
        )
      ),
      h('div',{style:S.section},
        h('div',{style:S.sectionTitle},'Cumulative Revenue Path'),
        h('div',{style:S.chartWrap},
          h(ResponsiveContainer,{width:'100%',height:'100%'},
            h(AreaChart,{data:cumulativeData,margin:{top:20,right:20,bottom:5,left:10}},
              h(CartesianGrid,{strokeDasharray:'3 3',stroke:'#334155'}),
              h(XAxis,{dataKey:'month',stroke:'#64748B',fontSize:12}),
              h(YAxis,{stroke:'#64748B',fontSize:11,tickFormatter:function(v){return '$'+(v/1000000).toFixed(1)+'M';}}),
              h(Tooltip,{formatter:function(v){return v!=null?fmtFull(v):'-';},contentStyle:{background:'#1E293B',border:'1px solid #475569',borderRadius:8,color:'#E2E8F0'}}),
              h(Legend,null),
              h(Area,{dataKey:'target',stroke:'#475569',fill:'rgba(71,85,105,0.2)',name:'Target Path',strokeDasharray:'5 5'}),
              h(Area,{dataKey:'actual',stroke:'#3B82F6',fill:'rgba(59,130,246,0.15)',name:'Actual',connectNulls:false}),
              h(ReferenceLine,{y:BREAKEVEN_EXCL,stroke:'#EF4444',strokeDasharray:'3 3',label:{value:'Break-even $3.6M',fill:'#EF4444',fontSize:10,position:'right'}})
            )
          )
        )
      )
    ),
    h('div',{style:Object.assign({},S.section,{marginTop:0})},
      h('div',{style:S.sectionTitle},'Product Line Performance (YTD)'),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:20}},
        productYTD.map(function(p){
          var gpOk = p.gpPct >= p.targetGP-10;
          return h('div',{key:p.key,style:Object.assign({},S.productCard,{borderLeft:'3px solid '+p.color})},
            h('div',{style:{fontSize:13,fontWeight:700,color:p.color,marginBottom:8}},p.name),
            h('div',{style:{fontSize:22,fontWeight:800,color:'#F8FAFC'}},fmt(p.rev)),
            h('div',{style:{fontSize:11,color:'#94A3B8',marginTop:4}},'GP: '+pct(p.gpPct)+' (target '+pct(p.targetGP)+')'),
            h('div',{style:{fontSize:11,color:gpOk?'#10B981':'#F59E0B',fontWeight:600,marginTop:2}},gpOk?'On track':'Below target GP'),
            h('div',{style:{fontSize:11,color:'#64748B',marginTop:4}},pct(p.progress)+' of '+fmt(p.targetRev)),
            h('div',{style:S.progressBar},h('div',{style:Object.assign({},S.progressFill,{width:Math.min(p.progress,100)+'%',background:p.color})}))
          );
        })
      )
    ),
    h('div',{style:S.section},
      h('div',{style:S.sectionTitle},'Monthly Summary'),
      h(DataTable,{
        headers:['Month','Target','Actual','Completion','Gross Profit','EBIDA','Cash'],
        rows:MONTHLY_DATA.map(function(m){
          return[m.month,fmtFull(m.target),fmtFull(m.revenue.total),pct(m.revenue.total/m.target*100),fmtFull(m.gp)+' ('+pct(m.gpPct)+')',fmtFull(m.ebida),fmtFull(m.cash)];
        }).concat([['YTD',fmtFull(ytdTarget),fmtFull(ytdRevenue),pct(ytdCompletion),fmtFull(ytdGP)+' ('+pct(ytdGPPct)+')',fmtFull(ytdEBIDA),fmtFull(latestCash)]]),
        totalRow:true
      })
    )
  );
}

/* ========== TAB 2: OPERATIONAL EXPENSES (IMPROVED) ========== */
function OpExTab(){
  var totalBudget = MONTHLY_OPEX_BUDGET*monthsElapsed;
  var variance = ytdOpEx - totalBudget;
  var variancePct = variance/totalBudget*100;
  var opexRevPct = ytdOpEx/ytdRevenue*100;
  var revenuePerOpex = ytdRevenue/ytdOpEx;

  var opexBreakdown = [
    {name:'HR',value:ytdHR,color:'#3B82F6',budget:COST_BUDGET.hr*monthsElapsed},
    {name:'Rent & Outgoing',value:ytdRent,color:'#10B981',budget:COST_BUDGET.rent*monthsElapsed},
    {name:'Sales',value:ytdSales,color:'#F59E0B',budget:COST_BUDGET.sales*monthsElapsed},
    {name:'Operating',value:ytdOperating,color:'#8B5CF6',budget:COST_BUDGET.opex*monthsElapsed}
  ];

  var neededForDownside = remainingMonths > 0 ? (4162000 - ytdRevenue) / remainingMonths : 0;

  return h('div',null,

            h('div',null,h('div',{style:{fontSize:11,color:'#94A3B8'}},'EBIDA'),h('div',{style:{fontSize:18,fontWeight:700,color:s.ebida>=0?'#10B981':'#EF4444'}},fmt(s.ebida)))

            needed>0?h('div',{style:{fontSize:11,color:'#64748B',marginTop:6}},'Need '+fmt(needed)+'/mo remaining'):null
          )
        );
      })
    ),
    h('div',{style:Object.assign({},S.section,{marginTop:24})},

      h('div',{style:{position:'relative',height:70,background:'#0F172A',borderRadius:8,overflow:'visible',margin:'24px 0 8px'}},
        h('div',{style:{position:'absolute',left:0,top:0,bottom:0,width:'27%',background:'rgba(239,68,68,0.15)',borderRight:'2px solid #EF4444'}}),
        h('div',{style:{position:'absolute',left:'27%',top:0,bottom:0,width:'21%',background:'rgba(245,158,11,0.1)',borderRight:'2px solid #F59E0B'}}),
        h('div',{style:{position:'absolute',left:'48%',top:0,bottom:0,width:'34%',background:'rgba(16,185,129,0.08)',borderRight:'2px solid #10B981'}}),
        h('div',{style:{position:'absolute',left:'82%',top:0,bottom:0,right:0,background:'rgba(16,185,129,0.15)'}}),
        h('div',{style:{position:'absolute',left:gaugeWidth+'%',top:-6,bottom:-6,width:4,background:'#F8FAFC',borderRadius:2,zIndex:10,transform:'translateX(-50%)'}}),
        h('div',{style:{position:'absolute',left:gaugeWidth+'%',top:-22,transform:'translateX(-50%)',background:scenarioColor,color:'#FFF',padding:'3px 10px',borderRadius:6,fontSize:11,fontWeight:700,whiteSpace:'nowrap'}},fmt(projectedAnnual)),
        h('div',{style:{position:'absolute',bottom:8,left:'5%',fontSize:10,color:'#EF4444',fontWeight:600}},'Floor $3.2M'),
        h('div',{style:{position:'absolute',bottom:8,left:'30%',fontSize:10,color:'#F59E0B',fontWeight:600}},'Downside $4.2M'),
        h('div',{style:{position:'absolute',bottom:8,left:'52%',fontSize:10,color:'#10B981',fontWeight:600}},'Target $5.7M')
      )
    ),
    h('div',{style:S.section},
      h('div',{style:S.sectionTitle},'Scenario Financial Comparison'),
      h('div',{style:{width:'100%',height:350}},
        h(ResponsiveContainer,{width:'100%',height:'100%'},
          h(BarChart,{data:scenarioChartData,margin:{top:20,right:20,bottom:5,left:10}},
            h(CartesianGrid,{strokeDasharray:'3 3',stroke:'#334155'}),
            h(XAxis,{dataKey:'name',stroke:'#64748B',fontSize:12}),
            h(YAxis,{stroke:'#64748B',fontSize:11,tickFormatter:function(v){return '$'+(v/1000000).toFixed(1)+'M';}}),
            h(Tooltip,{formatter:function(v){return fmtFull(v);},contentStyle:{background:'#1E293B',border:'1px solid #475569',borderRadius:8,color:'#E2E8F0'}}),
            h(Legend,null),
            h(Bar,{dataKey:'revenue',fill:'#3B82F6',name:'Revenue',radius:[4,4,0,0]}),
            h(Bar,{dataKey:'gp',fill:'#10B981',name:'Gross Profit',radius:[4,4,0,0]}),
            h(Bar,{dataKey:'ebida',fill:'#F59E0B',name:'EBIDA',radius:[4,4,0,0]}),

      h('div',{style:S.sectionTitle},'Path to Target'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16}},
        h('div',{style:S.miniCard},
          h('div',{style:{fontSize:11,color:'#94A3B8',marginBottom:4}},'Remaining Revenue Needed'),
          h('div',{style:{fontSize:24,fontWeight:800,color:'#F8FAFC'}},fmt(ANNUAL_TARGET-ytdRevenue)),
          h('div',{style:{fontSize:11,color:'#64748B',marginTop:4}},remainingMonths+' months remaining')
        ),

        ),

          h('div',{style:{fontSize:24,fontWeight:800,color:scenarioColor}},scenarioLabel),
          h('div',{style:{fontSize:11,color:'#64748B',marginTop:4}},'Based on '+monthsElapsed+'-month run rate')
        )
      )
    )

}

/* ========== TAB 6: COMPARE WITH 2025 (SAME PERIOD) ========== */
function CompareTab(){
  var fy25Monthly = FY2025.monthly;
  var periodCompare = MONTHS.slice(0,monthsElapsed).map(function(m){
    var fy26 = MONTHLY_DATA.find(function(d){return d.month===m;});
    var fy25 = fy25Monthly[m] || {};
    return {month:m,rev2025:fy25.revenue||0,rev2026:fy26?fy26.revenue.total:0,gp2025:fy25.gp||0,gp2026:fy26?fy26.gp:0,opex2025:fy25.opex||0,opex2026:fy26?fy26.opex.total:0,ebida2025:fy25.ebida||0,ebida2026:fy26?fy26.ebida:0,cash2025:fy25.cash||0,cash2026:fy26?fy26.cash:0};
  });
  var ytd25Rev = periodCompare.reduce(function(s,d){return s+d.rev2025;},0);
  var ytd26Rev = periodCompare.reduce(function(s,d){return s+d.rev2026;},0);
  var ytd25GP = periodCompare.reduce(function(s,d){return s+d.gp2025;},0);
  var ytd26GP = periodCompare.reduce(function(s,d){return s+d.gp2026;},0);
  var ytd25OpEx = periodCompare.reduce(function(s,d){return s+d.opex2025;},0);
  var ytd26OpEx = periodCompare.reduce(function(s,d){return s+d.opex2026;},0);
  var ytd25EBIDA = periodCompare.reduce(function(s,d){return s+d.ebida2025;},0);
  var ytd26EBIDA = periodCompare.reduce(function(s,d){return s+d.ebida2026;},0);
  var revChange = ytd25Rev>0?(ytd26Rev-ytd25Rev)/ytd25Rev*100:0;
  var gpChange = ytd25GP>0?(ytd26GP-ytd25GP)/ytd25GP*100:0;
  var opexChange = ytd25OpEx>0?(ytd26OpEx-ytd25OpEx)/ytd25OpEx*100:0;
  var lastMonth = MONTHLY_DATA[MONTHLY_DATA.length-1].month;

  return h('div',null,
    h('div',{style:{marginBottom:20,padding:'12px 16px',background:'rgba(59,130,246,0.1)',border:'1px solid rgba(59,130,246,0.3)',borderRadius:8}},
      h('div',{style:{fontSize:13,color:'#60A5FA',fontWeight:600}},'Same-Period Comparison: Jan-'+lastMonth+' 2025 vs Jan-'+lastMonth+' 2026')
    ),
    h('div',{style:S.kpiRow},
      h(KpiCard,{label:'Revenue (Same Period)',value:fmt(ytd26Rev),sub:'2025: '+fmt(ytd25Rev),trend:fmtPct(revChange)+' YoY',trendUp:revChange>0,valueColor:revChange>0?'#10B981':'#EF4444'}),
      h(KpiCard,{label:'Gross Profit',value:fmt(ytd26GP),sub:'2025: '+fmt(ytd25GP),trend:fmtPct(gpChange)+' YoY',trendUp:gpChange>0}),
      h(KpiCard,{label:'OpEx',value:fmt(ytd26OpEx),sub:'2025: '+fmt(ytd25OpEx),trend:fmtPct(opexChange)+' YoY',trendUp:opexChange<=0}),
      h(KpiCard,{label:'EBIDA',value:fmtFull(ytd26EBIDA),sub:'2025: '+fmtFull(ytd25EBIDA),trend:fmtFull(ytd26EBIDA-ytd25EBIDA)+' difference',trendUp:ytd26EBIDA>=ytd25EBIDA})
    ),
    h('div',{style:S.grid2},
      h('div',{style:S.section},
        h('div',{style:S.sectionTitle},'Monthly Revenue: 2025 vs 2026'),
        h('div',{style:S.chartWrap},
          h(ResponsiveContainer,{width:'100%',height:'100%'},
            h(BarChart,{data:periodCompare,margin:{top:20,right:20,bottom:5,left:10}},
              h(CartesianGrid,{strokeDasharray:'3 3',stroke:'#334155'}),
              h(XAxis,{dataKey:'month',stroke:'#64748B',fontSize:12}),
              h(YAxis,{stroke:'#64748B',fontSize:11,tickFormatter:function(v){return '$'+Math.round(v/1000)+'K';}}),
              h(Tooltip,{formatter:function(v){return fmtFull(v);},contentStyle:{background:'#1E293B',border:'1px solid #475569',borderRadius:8,color:'#E2E8F0'}}),
              h(Legend,null),
              h(Bar,{dataKey:'rev2025',fill:'#475569',name:'2025',radius:[4,4,0,0]}),
              h(Bar,{dataKey:'rev2026',fill:'#3B82F6',name:'2026',radius:[4,4,0,0]})
            )
          )
        )
      ),
      h('div',{style:S.section},
        h('div',{style:S.sectionTitle},'Monthly EBIDA: 2025 vs 2026'),
        h('div',{style:S.chartWrap},
          h(ResponsiveContainer,{width:'100%',height:'100%'},
            h(BarChart,{data:periodCompare,margin:{top:20,right:20,bottom:5,left:10}},
              h(CartesianGrid,{strokeDasharray:'3 3',stroke:'#334155'}),
              h(XAxis,{dataKey:'month',stroke:'#64748B',fontSize:12}),
              h(YAxis,{stroke:'#64748B',fontSize:11,tickFormatter:function(v){return '$'+Math.round(v/1000)+'K';}}),
              h(Tooltip,{formatter:function(v){return fmtFull(v);},contentStyle:{background:'#1E293B',border:'1px solid #475569',borderRadius:8,color:'#E2E8F0'}}),
              h(Legend,null),
              h(Bar,{dataKey:'ebida2025',fill:'#475569',name:'2025',radius:[4,4,0,0]}),
              h(Bar,{dataKey:'ebida2026',fill:'#10B981',name:'2026',radius:[4,4,0,0]})
            )
          )
        )
      )
    ),
    h('div',{style:S.section},
      h('div',{style:S.sectionTitle},'Same-Period P&L Comparison'),
      h(DataTable,{
        headers:['Metric','2025 (Jan-'+lastMonth+')','2026 (Jan-'+lastMonth+')','Change','% Change'],
        rows:[
          ['Revenue',fmtFull(ytd25Rev),fmtFull(ytd26Rev),fmtFull(ytd26Rev-ytd25Rev),fmtPct(revChange)],
          ['Gross Profit',fmtFull(ytd25GP),fmtFull(ytd26GP),fmtFull(ytd26GP-ytd25GP),fmtPct(gpChange)],
          ['GP%',pct(ytd25Rev>0?ytd25GP/ytd25Rev*100:0),pct(ytdGPPct),fmtPct(ytdGPPct-(ytd25Rev>0?ytd25GP/ytd25Rev*100:0))+' pts',''],
          ['Total OpEx',fmtFull(ytd25OpEx),fmtFull(ytd26OpEx),fmtFull(ytd26OpEx-ytd25OpEx),fmtPct(opexChange)],
          ['EBIDA',fmtFull(ytd25EBIDA),fmtFull(ytd26EBIDA),fmtFull(ytd26EBIDA-ytd25EBIDA),ytd25EBIDA!==0?fmtPct((ytd26EBIDA-ytd25EBIDA)/Math.abs(ytd25EBIDA)*100):'-']
        ]
      })
    ),
    h('div',{style:S.section},
      h('div',{style:S.sectionTitle},'Month-by-Month Revenue Comparison'),
      h(DataTable,{
        headers:['Month','2025 Revenue','2026 Revenue','Difference','% Change'],
        rows:periodCompare.map(function(d){
          var diff = d.rev2026-d.rev2025;
          var pctChg = d.rev2025>0?(diff/d.rev2025*100):0;
          return [d.month,fmtFull(d.rev2025),fmtFull(d.rev2026),fmtFull(diff),fmtPct(pctChg)];
        }).concat([['YTD Total',fmtFull(ytd25Rev),fmtFull(ytd26Rev),fmtFull(ytd26Rev-ytd25Rev),fmtPct(revChange)]]),
        totalRow:true
      })
    ),
    h('div',{style:Object.assign({},S.section,{background:'linear-gradient(135deg,#1E293B,#0F172A)'})},
      h('div',{style:S.sectionTitle},'Full Year Outlook'),
      h(DataTable,{
        headers:['Metric','FY2025 Full Year','FY2026 Annualized','YoY Change'],
        rows:[
          ['Revenue',fmtFull(FY2025.revenue.total),fmtFull(projectedAnnual),fmtPct((projectedAnnual-FY2025.revenue.total)/FY2025.revenue.total*100)],
          ['Direct Expenses',fmtFull(FY2025.directExpenses.total),fmtFull(ytdDE*(12/monthsElapsed)),fmtPct(((ytdDE*12/monthsElapsed)-FY2025.directExpenses.total)/FY2025.directExpenses.total*100)],
          ['Gross Profit',fmtFull(FY2025.grossProfit),fmtFull(ytdGP*(12/monthsElapsed)),fmtPct(((ytdGP*12/monthsElapsed)-FY2025.grossProfit)/FY2025.grossProfit*100)],
          ['GP%',pct(FY2025.gpPct),pct(ytdGPPct),fmtPct(ytdGPPct-FY2025.gpPct)+' pts'],
          ['Total OpEx',fmtFull(FY2025.operationalExpenses.totalOpEx),fmtFull(ytdOpEx*(12/monthsElapsed)),fmtPct(((ytdOpEx*12/monthsElapsed)-FY2025.operationalExpenses.totalOpEx)/FY2025.operationalExpenses.totalOpEx*100)],
          ['Net Profit / EBIDA',fmtFull(FY2025.netProfit),fmtFull(ytdEBIDA*(12/monthsElapsed)),fmtPct(((ytdEBIDA*12/monthsElapsed)-FY2025.netProfit)/Math.abs(FY2025.netProfit)*100)]
        ]
      })
    )
  );
}

/* ========== MAIN APP ========== */
var TABS = ['Overview','Operational Expenses','Debt','Cash Prediction','Scenarios','Compare with 2025'];

function App(){
  var state = useState(0);
  var activeTab = state[0];
  var setTab = state[1];
  var tabContent;
  switch(activeTab){
    case 0:tabContent=h(OverviewTab);break;
    case 1:tabContent=h(OpExTab);break;
    case 2:tabContent=h(DebtTab);break;
    case 3:tabContent=h(CashTab);break;
    case 4:tabContent=h(ScenariosTab);break;
    case 5:tabContent=h(CompareTab);break;
    default:tabContent=h(OverviewTab);
  }
  return h('div',{style:{minHeight:'100vh',background:'#0B1120'}},
    h('div',{style:S.header},
      h('div',{style:{display:'flex',alignItems:'center',gap:16}},
        h('div',{style:{width:10,height:10,borderRadius:'50%',background:latestCash>50000?'#10B981':'#EF4444',boxShadow:'0 0 8px '+(latestCash>50000?'#10B981':'#EF4444')}}),
        h('div',{style:S.headerTitle},'Shafston 2026 Financial Dashboard')
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:12}},
        h('div',{style:Object.assign({},S.badge,{background:scenarioColor+'22',color:scenarioColor,border:'1px solid '+scenarioColor})},scenarioLabel+' TRAJECTORY'),
        h('div',{style:{fontSize:12,color:'#64748B'}},'Data: Feb 2026 | Generated: '+new Date().toLocaleDateString())
      )
    ),
    h('div',{style:S.nav},
      TABS.map(function(tab,i){
        return h('button',{key:i,style:activeTab===i?S.navBtnActive:S.navBtn,onClick:function(){setTab(i);}},tab);
      })
    ),
    h('div',{style:S.content},tabContent),
    h('div',{style:S.footer},'Shafston International College | Financial Dashboard 2026 | Data sourced from Xero | Updated '+new Date().toLocaleDateString())
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
